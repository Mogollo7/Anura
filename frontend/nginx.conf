server {
    listen 80;
    server_name localhost;

    # Aumentar tamaño permitido de archivos (para fotos de móvil)
    client_max_body_size 20M;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Uploads directory
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        autoindex off;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Proxy to Backend Services
    location /api/predict {
        proxy_pass http://ai-service:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ai {
        proxy_pass http://ai-service:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/auth {
        proxy_pass http://auth-service:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/preferences {
        proxy_pass http://auth-service:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/observations {
        proxy_pass http://observation-service:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/geo {
        proxy_pass http://geo-service:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }



    location /api/thumbnail {
        proxy_pass http://thumbnail-service:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/explorer {
        proxy_pass http://explorer-service:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/notifications {
        proxy_pass http://notification-service:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/validation {
        proxy_pass http://validation-service:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
